services:
  # Frontend - React UI
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aria-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000
    depends_on:
      - flask
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules

  # Backend - Flask API
  flask:
    build:
      context: ./aria-backend
      dockerfile: Dockerfile
    container_name: aria-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_PORT=5000
    env_file:
      - aria-backend/.env
    volumes:
      - ./aria-backend:/app
    depends_on:
      - rasa
    command: python app.py

  # Rasa NLU Server
  rasa:
    image: rasa/rasa:3.6.0
    container_name: aria-rasa
    ports:
      - "5005:5005"
    environment:
      - RASA_PORT=5005
    entrypoint: /bin/sh
    command: -c "rasa init --no-prompt && rasa train --quiet && rasa run --enable-api --cors '*' --port 5005"
    working_dir: /app
